name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift:
    name: Swift twins (build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test

  web:
    name: Web twins (build + test + generated-output freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm test
        working-directory: web
      # The twin contract's mechanical check: regenerating from the TS/JSON
      # sources must reproduce the committed Swift/SCSS/TS outputs exactly.
      - name: Generated outputs are fresh
        run: |
          node tools/generate-tokens.mjs
          node tools/generate-zone-country.mjs
          git diff --exit-code
