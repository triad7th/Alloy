name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift:
    name: Swift twins (build + test)
    # AlloyUI uses Liquid Glass APIs (GlassEffectContainer, .glassEffect),
    # which need the macOS/iOS 26 SDK — macos-15's Xcode 16 cannot compile it.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test
      # Second-tier harness check: build-only, proves the package is
      # consumable by an app-shaped target (per the independence direction doc).
      - name: Apple harness builds
        run: swift build --package-path examples/apple-harness

  web:
    name: Web twins (build + test + generated-output freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm test
        working-directory: web
      # The twin contract's mechanical check: regenerating from the TS/JSON
      # sources must reproduce the committed Swift/SCSS/TS outputs exactly.
      - name: Generated outputs are fresh
        run: |
          node tools/generate-tokens.mjs
          node tools/generate-zone-country.mjs
          git diff --exit-code

  web-harness:
    name: Web harness (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/web-harness/package-lock.json
      - run: npm ci
        working-directory: examples/web-harness
      - run: npm run build
        working-directory: examples/web-harness
