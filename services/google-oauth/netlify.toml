# Stateless Google OAuth token exchange shared by the Ally web apps.
# Env (set in the Netlify UI): GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, ALLOWED_ORIGINS.
[build]
  publish = "public"

# Local dev port: Alloy's infra slot in the Ally-family port scheme (45xx
# block, x90 infra) — keeps `npx netlify dev` off other products' ports.
[dev]
  port = 4590

[functions]
  directory = "functions"
